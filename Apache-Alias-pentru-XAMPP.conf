# Adaugă aceste linii în configurarea Apache (XAMPP) ca să deschizi
# Bebe Image Editor la http://localhost/bebe/ FĂRĂ să muți fișierele din
# d:\Teste cursor\Bebe Image Editor\
#
# Unde le adaugi:
#   XAMPP: deschide C:\xampp\apache\conf\httpd.conf în Notepad (ca Administrator),
#   sau C:\xampp\apache\conf\extra\httpd-vhosts.conf
#   și lipește blocul de mai jos LA SFÂRȘITUL fișierului. Apoi repornește Apache.
#
# Rezultat: http://localhost/ rămâne pentru HTML Editor (index V.4.php),
#           http://localhost/bebe/ deschide Bebe Image Editor.

Alias /bebe "d:/Teste cursor/Bebe Image Editor"
<Directory "d:/Teste cursor/Bebe Image Editor">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
    DirectoryIndex index.php
</Directory>
