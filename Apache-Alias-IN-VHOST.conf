# IMPORTANT: Alias-ul trebuie adăugat ÎNĂUNTRUL VirtualHost-ului care servește localhost,
# nu la sfârșitul httpd.conf. Altfel /bebe/ nu merge.
#
# Pași:
# 1. Deschide: C:\xampp\apache\conf\extra\httpd-vhosts.conf
# 2. Caută blocul care conține "localhost" sau "ServerName localhost" sau DocumentRoot către "Teste cursor" / "HTML Editor".
# 3. ÎnĂUNTRUL acelui bloc <VirtualHost ...> ... </VirtualHost>, adaugă liniile de mai jos
#    (de obicei după linia DocumentRoot, înainte de </VirtualHost>).
# 4. Salvează și repornește Apache.
#
# Exemplu cum ar putea arăta VirtualHost-ul tău (nu șterge nimic, doar adaugă liniile Alias și Directory):
#
# <VirtualHost *:80>
#     ServerName localhost
#     DocumentRoot "d:/Teste cursor/HTML Editor"
#     <Directory "d:/Teste cursor/HTML Editor">
#         ...
#     </Directory>
#
#     # --- ADAUGĂ ASTE DOUA BLOCURI PENTRU BEBE ---
#     Alias /bebe "d:/Teste cursor/Bebe Image Editor"
#     <Directory "d:/Teste cursor/Bebe Image Editor">
#         Options Indexes FollowSymLinks
#         AllowOverride All
#         Require all granted
#         DirectoryIndex index.php
#     </Directory>
#     # --- SFÂRȘIT ---
#
# </VirtualHost>

Alias /bebe "d:/Teste cursor/Bebe Image Editor"
<Directory "d:/Teste cursor/Bebe Image Editor">
    Options Indexes FollowSymLinks
    AllowOverride All
    Require all granted
    DirectoryIndex index.php
</Directory>
